<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תיקון הכללי - האתגר</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff4500">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="fire-icon">🔥</div>
            <h1>תיקון הכללי</h1>
            <p id="sub-title">אתגר 40 יום</p>
        </header>

        <main class="card">
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">התקדמות</span>
                    <span class="stat-value" id="percent">0%</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">ימים שנותרו</span>
                    <span class="stat-value" id="days-left">40</span>
                </div>
            </div>

            <div class="counter-display">
                <div class="glow-circle">
                    <span id="count">0</span>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-bar-bg">
                    <div id="bar" class="progress-bar-fill"></div>
                </div>
            </div>

            <button id="markBtn" class="main-button" onclick="mark()">
                סימנתי להיום! 🔥
            </button>

            <p id="last-mark-text">טרם התחלת את האתגר</p>
        </main>

        <footer>
            <div class="settings">
                <select id="goalSelect" onchange="changeGoal()">
                    <option value="40">יעד: 40 יום</option>
                    <option value="90">יעד: 90 יום</option>
                    <option value="180">יעד: 180 יום</option>
                </select>
                <button class="reset-link" onclick="resetAll()">איפוס נתונים</button>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
